services:
  postgresdb:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: llm_proxy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d llm_proxy']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: .
    depends_on:
      postgresdb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresdb:5432/llm_proxy?schema=public
    command: >
      bash -c "
        echo 'Running Prisma db push to sync schema...' &&
        npx prisma db push --accept-data-loss &&
        echo 'Schema sync complete!'
      "
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgresdb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresdb:5432/llm_proxy?schema=public
      APP_SECRET: change-this-before-production
      PORT: 8000
      FRONTEND_DIST_DIR: /app/frontend/dist/frontend/browser
    expose:
      - '8000'

volumes:
  postgres_data:
