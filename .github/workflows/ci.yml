name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pulpo_test?schema=public
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Check formatting
        run: deno fmt --check

      - name: Lint backend
        run: deno lint

      - name: Type check backend
        run: deno check main.ts

      - name: Run backend tests
        run: deno test --allow-env --allow-read --allow-net --allow-ffi

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Type check frontend
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: frontend

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: frontend
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulpo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pulpo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pulpo_test?schema=public
      APP_SECRET: ci-secret
      DENO_ENV: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Build frontend
        run: npm run frontend:build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start mock provider
        run: nohup deno run --allow-net e2e/mock-provider.ts > mock-provider.log 2>&1 &

      - name: Start app server
        run: nohup deno run --allow-net --allow-read --allow-env --allow-ffi main.ts > app.log 2>&1 &

      - name: Wait for services
        run: |
          until curl --fail --silent http://127.0.0.1:4010/health; do sleep 2; done
          until curl --fail --silent http://127.0.0.1:8000/api/health; do sleep 2; done

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            app.log
            mock-provider.log
